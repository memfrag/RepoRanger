name: RepoRanger
attributes:
    ORGANIZATIONNAME: Apparata AB
    BuildIndependentTargetsInParallel: YES

options:
    bundleIdPrefix: io.apparata
    createIntermediateGroups: true
    deploymentTarget:
        macOS: 26.0
    groupSortPosition: top
    generateEmptyDirectories: true
    usesTabs: false
    indentWidth: 4
    tabWidth: 4
    defaultConfig: Debug
    defaultSourceDirectoryType: syncedFolder

configs:
    Debug: debug
    Release: release

settings:
    base:
        SWIFT_VERSION: '6.2'
        INFOPLIST_KEY_NSHumanReadableCopyright: 'Copyright © 2026 Apparata AB. All rights reserved.'
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: Yes
        ENABLE_USER_SCRIPT_SANDBOXING: No
        DEAD_CODE_STRIPPING: Yes
        STRING_CATALOG_GENERATE_SYMBOLS: Yes
        SWIFT_DEFAULT_ACTOR_ISOLATION: 'MainActor'
    configs:
        Release:
            SWIFT_COMPILATION_MODE: wholemodule

packages:
    AppDesign:
        path: Packages/AppDesign
    AppRouting:
        url: https://github.com/apparata/AppRouting.git
        exactVersion: 0.9.2
    AttributionsUI:
        url: https://github.com/apparata/AttributionsUI.git
        exactVersion: 1.1.1
    BinaryDataKit:
        url: https://github.com/apparata/BinaryDataKit.git
        exactVersion: 1.0.6
    CGMath:
        url: https://github.com/apparata/CGMath.git
        exactVersion: 1.1.2
    CollectionKit:
        url: https://github.com/apparata/CollectionKit.git
        exactVersion: 1.1.1
    Constructs:
        url: https://github.com/apparata/Constructs.git
        exactVersion: 2.1.2
    KeyValueStore:
        url: https://github.com/apparata/KeyValueStore.git
        exactVersion: 1.0.2
    MarkdownUI:
        url: https://github.com/apparata/MarkdownUI.git
        exactVersion: 0.9.1
    Markin:
        url: https://github.com/apparata/Markin.git
        exactVersion: 1.0.1
    MathKit:
        url: https://github.com/apparata/MathKit.git
        exactVersion: 2.2.2
    MessagePackKit:
        url: https://github.com/apparata/MessagePackKit.git
        exactVersion: 1.4.1
    SensibleStyling:
        url: https://github.com/apparata/SensibleStyling.git
        exactVersion: 0.2.1
    SettingsUI:
        url: https://github.com/apparata/SettingsUI.git
        exactVersion: 1.1.4
    SwiftUIToolbox:
        url: https://github.com/apparata/SwiftUIToolbox.git
        exactVersion: 1.9.3
    SystemKit:
        url: https://github.com/apparata/SystemKit.git
        exactVersion: 1.8.0
    TextToolbox:
        url: https://github.com/apparata/TextToolbox.git
        exactVersion: 1.4.0
    URLToolbox:
        url: https://github.com/apparata/URLToolbox.git
        exactVersion: 1.3.1
    UserDefaultsUI:
        url: https://github.com/apparata/UserDefaultsUI.git
        exactVersion: 1.0.1
    Zipcode:
        url: https://github.com/apparata/Zipcode.git
        exactVersion: 1.0.1
        
targets:
    RepoRanger:
        type: application
        platform: macOS
        sources:
            - path: RepoRanger
        dependencies:
            - package: AppRouting
            - package: AttributionsUI
            - package: BinaryDataKit
            - package: CGMath
            - package: CollectionKit
            - package: Constructs
            - package: KeyValueStore
            - package: MarkdownUI
            - package: Markin
            - package: MathKit
            - package: MessagePackKit
            - package: SensibleStyling
            - package: SettingsUI
            - package: SwiftUIToolbox
            - package: SystemKit
            - package: TextToolbox
            - package: URLToolbox
            - package: UserDefaultsUI
            - package: Zipcode
        settings:
            base:
                GENERATE_INFOPLIST_FILE: Yes
                ENABLE_PREVIEWS: Yes
                DEVELOPMENT_ASSET_PATHS: '"RepoRanger/Preview Content"'
                ENABLE_BITCODE: No
                ENABLE_APP_SANDBOX: Yes
                ENABLE_OUTGOING_NETWORK_CONNECTIONS: Yes
                ENABLE_USER_SELECTED_FILES: 'readwrite'
            configs:
                Debug:
                    CODE_SIGN_IDENTITY: '-'
                Release:
                    CODE_SIGN_IDENTITY: '-'
        postCompileScripts:
            - script: |
                      if which mint >/dev/null; then
                          /usr/bin/xcrun --sdk macosx mint run swiftlint lint --config "${PROJECT_DIR}/.swiftlint.yml"
                      fi
              name: Swift Lint
              basedOnDependencyAnalysis: No

schemes:
    RepoRanger (Debug):
        build:
            targets:
                RepoRanger: [run, profile, analyze, archive]
        run:
            config: Debug
        profile:
            config: Release
        analyze:
            config: Debug
        archive:
            config: Release
            customArchiveName: RepoRanger
            revealArchiveInOrganizer: true
    RepoRanger (Release):
        build:
            targets:
                RepoRanger: [run, profile, analyze, archive]
        run:
            config: Release
        profile:
            config: Release
        analyze:
            config: Release
        archive:
            config: Release
            customArchiveName: RepoRanger
            revealArchiveInOrganizer: true
